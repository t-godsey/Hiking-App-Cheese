<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dolly Sods Wilderness - Pace Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }
    .legend {
      background: white;
      padding: 8px 10px;
      line-height: 1.4;
      border-radius: 5px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.25);
      font-size: 12px;
    }
    .swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
      vertical-align: middle;
    }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #map { height: 100vh !important; width: 100% !important; page-break-inside: avoid; }
      .leaflet-control-container { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script>
    const map = L.map('map');
    const streetLayer = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      maxZoom: 17,
      subdomains: 'abc',
      attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap'
    });

    const speedLayerGroup = L.layerGroup().addTo(map);
    const elevationLayerGroup = L.layerGroup();

    function elevationGainColor(gainMeters, maxGainMeters) {
      if (gainMeters <= 0) return '#6baed6';
      const ratio = Math.max(0, Math.min(1, gainMeters / Math.max(maxGainMeters, 1)));
      if (ratio < 0.2) return '#c7e9c0';
      if (ratio < 0.4) return '#a1d99b';
      if (ratio < 0.6) return '#74c476';
      if (ratio < 0.8) return '#31a354';
      return '#006d2c';
    }

    fetch('Dollysods_pace_map.geojson')
      .then(r => r.json())
      .then(data => {
        let maxElevationGain = 0;
        data.features.forEach(feature => {
          const gain = Number(feature.properties.elev_delta_m || 0);
          if (gain > maxElevationGain) {
            maxElevationGain = gain;
          }
        });

        const speedLayer = L.geoJSON(data, {
          style: feature => ({
            color: feature.properties.zone_color || '#3388ff',
            weight: 5,
            opacity: 0.95
          }),
          onEachFeature: (feature, line) => {
            const p = feature.properties;
            line.bindPopup(
              `Seg ${p.segment_index}<br>Speed: ${Number(p.recommended_speed_mph).toFixed(2)} mph<br>Grade: ${Number(p.grade_pct).toFixed(1)}%<br>Zone: ${p.zone}`
            );
          }
        });
        speedLayer.addTo(speedLayerGroup);

        const elevationLayer = L.geoJSON(data, {
          style: feature => {
            const gain = Number(feature.properties.elev_delta_m || 0);
            return {
              color: elevationGainColor(gain, maxElevationGain),
              weight: 5,
              opacity: 0.95
            };
          },
          onEachFeature: (feature, line) => {
            const p = feature.properties;
            const gain = Math.max(0, Number(p.elev_delta_m || 0));
            line.bindPopup(
              `Seg ${p.segment_index}<br>Elevation gain: ${gain.toFixed(1)} m<br>Grade: ${Number(p.grade_pct).toFixed(1)}%<br>Speed: ${Number(p.recommended_speed_mph).toFixed(2)} mph`
            );
          }
        });
        elevationLayer.addTo(elevationLayerGroup);

        const baseMaps = {
          'OpenStreetMap': streetLayer,
          'Topographic': topoLayer
        };
        const overlays = {
          'Speed zones': speedLayerGroup,
          'Elevation gain': elevationLayerGroup
        };
        L.control.layers(baseMaps, overlays, { collapsed: false }).addTo(map);

        map.fitBounds(speedLayer.getBounds(), { padding: [20, 20] });
      });

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = "<div><strong>Speed zones</strong></div><div><span class=\"swatch\" style=\"background:#d73027\"></span>Slowdown zone <span style=\"font-weight:600;color:#333;\">(1.1\u20132.9 mph)</span></div><div><span class=\"swatch\" style=\"background:#fdae61\"></span>Steady zone <span style=\"font-weight:600;color:#333;\">(1.8\u20132.9 mph)</span></div><div><span class=\"swatch\" style=\"background:#1a9850\"></span>Speed-up zone <span style=\"font-weight:600;color:#333;\">(2.8\u20132.9 mph)</span></div><hr style=\"margin:6px 0;border:0;border-top:1px solid #ddd;\"><div><strong>Elevation gain</strong></div><div><span class=\"swatch\" style=\"background:#6baed6\"></span>Flat / downhill</div><div><span class=\"swatch\" style=\"background:#c7e9c0\"></span>Low uphill gain</div><div><span class=\"swatch\" style=\"background:#31a354\"></span>High uphill gain</div><div><span class=\"swatch\" style=\"background:#006d2c\"></span>Very high uphill gain</div>";
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
